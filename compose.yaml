services:
  backend:
    container_name: backend
    image: uv:1.1
    ports:
      - "8001:8000"
    networks:
      - gayoung-network
    depends_on:
      - maria
    extra_hosts:
    - "host.docker.internal:host-gateway"
    working_dir: /workspace
    volumes:
      - ./backend:/workspace:rw
    environment:
      - DB_HOST=maria
      - BASE_URL=http://host.docker.internal:11434
      - MODEL=gemma4:e4b
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    container_name: frontend
    image: node:24.13
    ports:
      - "80:5173"
    networks:
      - gayoung-network
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace:rw
    command: >
      sh -c "npm install && npm run dev -- --host"

  maria:
    container_name: maria
    image: mariadb:12.1.2
    restart: always
    ports:
      - "3306:3306"
    networks:
      - gayoung-network
    environment:
      - MARIADB_ROOT_PASSWORD=1234
      - MARIADB_DATABASE=Board
      - TZ=Asia/Seoul
    volumes:
      - ./mariadb/conf.d:/etc/mysql/conf.d:ro
      - ./mariadb/initdb.d:/docker-entrypoint-initdb.d:ro
      - maria-data:/var/lib/mysql:rw

networks:
  gayoung-network:
    driver: bridge

volumes:
  maria-data: